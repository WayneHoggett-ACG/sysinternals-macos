name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    # macos-15 ships the macOS 15 SDK, required to compile the macOS 15+
    # APIs that are runtime-guarded in the recorder.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Assemble app bundle (smoke build)
        run: make app
